<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeSight — Cytoscape PoC</title>
  <style>
    :root {
      --bg-deep: #060810; --bg-surface: #0a0e1a; --bg-card: #0d1220;
      --border: #162035; --border-sub: #0f172a;
      --text-pri: #e2e8f0; --text-sec: #94a3b8; --text-muted: #475569;
      --blue: #38bdf8; --green: #4ade80; --amber: #f59e0b; --purple: #a78bfa;
      --font: 'Cascadia Code', 'Fira Code', ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg-deep); color: var(--text-pri); }
    body::before { content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, #1e2d4d 1px, transparent 1px);
      background-size: 28px 28px; opacity: 0.3; pointer-events: none; z-index: 0; }
    header { position: relative; z-index: 50; display: flex; align-items: center; gap: 14px;
      padding: 0 24px; height: 52px; background: rgba(6,8,16,0.92);
      border-bottom: 1px solid var(--border); backdrop-filter: blur(16px); }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-pri); }
    .logo em { font-style: normal; color: var(--blue); }
    .badge { font-size: 10px; font-weight: 500; letter-spacing: 0.8px;
      background: rgba(124,58,237,.12); border: 1px solid rgba(124,58,237,.32);
      color: var(--purple); padding: 2px 9px; border-radius: 3px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted); }
    .header-meta { font-variant-numeric: tabular-nums; }
    .fps { padding: 4px 10px; background: rgba(13,18,32,.9); border: 1px solid var(--border);
      border-radius: 4px; font-variant-numeric: tabular-nums; color: var(--text-sec); }

    .tabs { position: relative; z-index: 20; display: flex; padding: 0 24px;
      background: rgba(6,8,16,0.88); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
    .tab { position: relative; padding: 11px 18px; font-size: 11px; font-weight: 500; letter-spacing: 0.4px;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s; user-select: none; }
    .tab:hover { color: var(--text-sec); }
    .tab[data-t="1"].active { color: var(--blue);  border-bottom-color: var(--blue); }
    .tab[data-t="2"].active { color: var(--green); border-bottom-color: var(--green); }
    .tab[data-t="3"].active { color: var(--amber); border-bottom-color: var(--amber); }

    .toolbar { position: relative; z-index: 18; display: flex; align-items: center; gap: 8px;
      padding: 8px 24px; background: rgba(10,14,26,0.7); border-bottom: 1px solid var(--border); }
    .tbtn { padding: 5px 11px; background: var(--bg-card); color: var(--text-sec); border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; font-family: var(--font); font-size: 11px; transition: background .15s, color .15s; }
    .tbtn:hover { background: var(--border); color: var(--text-pri); }
    .tbtn.danger { color: var(--amber); border-color: rgba(245,158,11,.32); }
    .tbtn.danger:hover { background: rgba(245,158,11,.12); }
    .toolbar .stats { margin-left: auto; font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    #cy { position: absolute; left: 0; right: 0; bottom: 0; top: calc(52px + 38px + 41px);
      background: var(--bg-deep); }
  </style>

  <!-- vendor bundles — Task 1 PoC (vsix media/cy/ 에 복사됨, esbuild.mjs 참조) -->
  <script src="cy/cytoscape.min.js"></script>
  <script src="cy/elk.bundled.js"></script>
  <script src="cy/cytoscape-elk.js"></script>
  <script src="cy/cytoscape-expand-collapse.js"></script>
</head>
<body>
  <header>
    <div class="logo">code<em>sight</em></div>
    <span class="badge">CYTOSCAPE POC</span>
    <div class="header-right">
      <span class="header-meta" id="proj">—</span>
      <span class="fps" id="fps">fps: —</span>
    </div>
  </header>

  <nav class="tabs">
    <div class="tab active" data-t="1"><span class="tab-pip"></span>Route Hierarchy</div>
    <div class="tab" data-t="2"><span class="tab-pip"></span>Component Tree</div>
    <div class="tab" data-t="3"><span class="tab-pip"></span>DB Schema</div>
  </nav>

  <div class="toolbar">
    <button class="tbtn" id="btn-collapse-all">Collapse All</button>
    <button class="tbtn danger" id="btn-expand-all">Expand All</button>
    <button class="tbtn" id="btn-collapse-top">Collapse leaves</button>
    <button class="tbtn" id="btn-fit">Fit</button>
    <button class="tbtn" id="btn-perf">Perf trace (5s)</button>
    <span class="stats" id="stats">—</span>
  </div>

  <div id="cy"></div>

  <script>
    // ─── plugin 등록 (CDN 로드와 동일 패턴) ────────────────────────────────────
    if (window.cytoscape && window.cytoscapeElk) {
      window.cytoscape.use(window.cytoscapeElk)
    }
    if (window.cytoscape && window.cytoscapeExpandCollapse) {
      window.cytoscape.use(window.cytoscapeExpandCollapse)
    }

    // 데이터 소스 — extension wiring(1-6)에서 window.__CODESIGHT_CY__ 주입.
    // Playwright/local 테스트 시에는 fixture 별도 주입 가능 (window.__CODESIGHT_CY_FIXTURE__).
    const fallback = {
      tab1: { elements: { nodes: [], edges: [] }, layout: { name: 'preset' }, style: [], expandCollapse: {}, wheelSensitivity: 0.2, meta: { tab: 'tab1', nodeCount: 0, groupCount: 0, edgeCount: 0 } },
      tab2: { elements: { nodes: [], edges: [] }, layout: { name: 'preset' }, style: [], expandCollapse: {}, wheelSensitivity: 0.2, meta: { tab: 'tab2', nodeCount: 0, groupCount: 0, edgeCount: 0 } },
      tab3: { elements: { nodes: [], edges: [] }, layout: { name: 'preset' }, style: [], expandCollapse: {}, wheelSensitivity: 0.2, meta: { tab: 'tab3', nodeCount: 0, groupCount: 0, edgeCount: 0 } },
      meta: { projectName: '—' }
    }
    const data = window.__CODESIGHT_CY__ || window.__CODESIGHT_CY_FIXTURE__ || fallback
    document.getElementById('proj').textContent = (data.meta && data.meta.projectName) || ''

    // ─── cy 인스턴스 lifecycle (tab 전환 시 destroy & rebuild) ──────────────────
    let cy = null
    let api = null   // expand-collapse api 핸들

    // G0 조건 2: Expand All UX 안전장치 — 1000 노드 이상 fully expanded 시 confirm.
    const EXPAND_ALL_SAFETY_THRESHOLD = 1000

    function destroyCurrent() {
      if (cy) {
        try { cy.destroy() } catch (_) { /* noop */ }
        cy = null
        api = null
      }
    }

    function mount(tabKey) {
      destroyCurrent()
      const opts = data[tabKey]
      if (!opts) return
      const startT = performance.now()
      cy = window.cytoscape({
        container: document.getElementById('cy'),
        elements: [...opts.elements.nodes, ...opts.elements.edges],
        wheelSensitivity: opts.wheelSensitivity || 0.2,
        style: opts.style,
        layout: opts.layout,
      })
      // expand-collapse 옵션 적용.
      api = cy.expandCollapse(opts.expandCollapse || {})
      const initMs = performance.now() - startT
      const m = opts.meta || {}
      document.getElementById('stats').textContent =
        `${tabKey} · nodes ${m.nodeCount}/groups ${m.groupCount}/edges ${m.edgeCount} · init ${initMs.toFixed(0)}ms`
      window.__SPIKE_LAST_INIT_MS__ = initMs
    }

    // ─── tab 전환 ────────────────────────────────────────────────────────────
    let currentTab = 'tab1'
    document.querySelectorAll('.tab').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'))
        el.classList.add('active')
        currentTab = 'tab' + el.dataset.t
        mount(currentTab)
      })
    })

    // ─── toolbar 버튼 ────────────────────────────────────────────────────────
    document.getElementById('btn-collapse-all').onclick = () => {
      if (!api) return
      const t = performance.now()
      api.collapseAll()
      cy.fit(undefined, 24)
      console.log(`[cy-poc] collapseAll: ${(performance.now() - t).toFixed(1)}ms`)
    }
    document.getElementById('btn-expand-all').onclick = () => {
      if (!api || !cy) return
      // safety guard — fully expanded 상태가 너무 무겁다 (Day 0: 11fps at 999 nodes).
      const fullCount = cy.nodes().length
      if (fullCount > EXPAND_ALL_SAFETY_THRESHOLD) {
        const ok = window.confirm(
          `${fullCount} 노드를 전체 펼치면 렌더 성능이 크게 떨어질 수 있습니다 (focus mode 권장).\n계속하시겠습니까?`
        )
        if (!ok) return
      }
      const t = performance.now()
      api.expandAll()
      cy.fit(undefined, 24)
      console.log(`[cy-poc] expandAll: ${(performance.now() - t).toFixed(1)}ms`)
    }
    document.getElementById('btn-collapse-top').onclick = () => {
      if (!api || !cy) return
      // expand-collapse plugin은 nested group을 한꺼번에 collapse하면 가장 상위 cue 안에
      // inner group을 흡수하여 cy.getElementById()로 접근 불가능한 state로 잠근다.
      // 따라서 "자식이 route인 leaf group"만 cue로 변환 — 부모 group(/api, /api/v1, module)은 expanded 유지.
      // 사용자 가치: drill-down 시작점 (resource 단위 cue 노출 → 클릭 시 routes 노출).
      const leafGroups = cy.nodes('[kind = "group"]').filter(g => {
        return g.children('[kind = "group"]').length === 0
      })
      const t = performance.now()
      api.collapse(leafGroups)
      cy.fit(undefined, 24)
      console.log(`[cy-poc] collapse leaves (${leafGroups.length}): ${(performance.now() - t).toFixed(1)}ms`)
    }
    document.getElementById('btn-fit').onclick = () => cy && cy.fit(undefined, 24)

    document.getElementById('btn-perf').onclick = async () => {
      if (!cy) return
      console.log('[cy-poc] perf trace start — 5s pan/zoom')
      const samples = []
      const startT = performance.now()
      let pCount = 0
      const startZoom = cy.zoom()
      const startPan = { ...cy.pan() }
      const interval = setInterval(() => {
        cy.pan({ x: startPan.x + Math.sin(pCount * 0.2) * 200, y: startPan.y + Math.cos(pCount * 0.2) * 100 })
        cy.zoom(startZoom * (0.7 + 0.3 * Math.sin(pCount * 0.1)))
        pCount++
      }, 16)

      let fCount = 0, lastT = performance.now()
      function probe() {
        fCount++
        const t = performance.now()
        if (t - lastT >= 200) {
          samples.push((fCount * 1000) / (t - lastT))
          fCount = 0; lastT = t
        }
        if (t - startT < 5000) requestAnimationFrame(probe)
        else {
          clearInterval(interval)
          cy.pan(startPan); cy.zoom(startZoom)
          const avg = samples.reduce((a, b) => a + b, 0) / samples.length
          const min = Math.min(...samples), max = Math.max(...samples)
          const msg = `perf: avg ${avg.toFixed(1)}fps  min ${min.toFixed(1)}  max ${max.toFixed(1)}  (${samples.length} samples)`
          console.log('[cy-poc] ' + msg)
          window.__SPIKE_PERF__ = { avg, min, max, samples: samples.length }
          window.alert(msg)
        }
      }
      requestAnimationFrame(probe)
    }

    // ─── FPS counter ────────────────────────────────────────────────────────
    let frames = 0, lastFpsT = performance.now()
    function tick() {
      frames++
      const now = performance.now()
      if (now - lastFpsT >= 500) {
        const fps = Math.round((frames * 1000) / (now - lastFpsT))
        document.getElementById('fps').textContent = `fps: ${fps}`
        frames = 0; lastFpsT = now
      }
      requestAnimationFrame(tick)
    }
    requestAnimationFrame(tick)

    // ─── 초기 마운트 ────────────────────────────────────────────────────────
    mount('tab1')
    window.__SPIKE_API__ = { mount, getCy: () => cy, getApi: () => api }
  </script>
</body>
</html>

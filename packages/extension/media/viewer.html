<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeSight</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg-deep: #060810; --bg-surface: #0a0e1a; --bg-card: #0d1220;
      --border: #162035; --border-sub: #0f172a;
      --text-pri: #e2e8f0; --text-sec: #94a3b8; --text-muted: #475569;
      --blue: #38bdf8; --green: #4ade80; --amber: #f59e0b;
      --font: 'Cascadia Code', 'Fira Code', ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg-deep); color: var(--text-pri); }
    body::before { content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, #1e2d4d 1px, transparent 1px);
      background-size: 28px 28px; opacity: 0.3; pointer-events: none; z-index: 0; }
    header { position: relative; z-index: 50; display: flex; align-items: center; gap: 14px;
      padding: 0 24px; height: 52px; background: rgba(6,8,16,0.92);
      border-bottom: 1px solid var(--border); backdrop-filter: blur(16px); }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-pri); }
    .logo em { font-style: normal; color: var(--blue); }
    .badge { font-size: 10px; font-weight: 500; letter-spacing: 0.8px;
      background: rgba(56,189,248,.08); border: 1px solid rgba(56,189,248,.22);
      color: var(--blue); padding: 2px 9px; border-radius: 3px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
    .header-meta { font-size: 10px; color: var(--text-muted); letter-spacing: 0.3px; }
    .tabs { position: relative; z-index: 20; display: flex; padding: 0 24px;
      background: rgba(6,8,16,0.88); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
    .tab { position: relative; padding: 13px 18px; font-size: 11px; font-weight: 500; letter-spacing: 0.4px;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s; user-select: none; }
    .tab:hover { color: var(--text-sec); }
    .tab[data-t="r"].active { color: var(--blue);  border-bottom-color: var(--blue); }
    .tab[data-t="s"].active { color: var(--green); border-bottom-color: var(--green); }
    .tab[data-t="d"].active { color: var(--amber); border-bottom-color: var(--amber); }
    .tab-pip { display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      margin-right: 8px; vertical-align: middle; opacity: 0.7; }
    .tab[data-t="r"] .tab-pip { background: var(--blue); }
    .tab[data-t="s"] .tab-pip { background: var(--green); }
    .tab[data-t="d"] .tab-pip { background: var(--amber); }
    .panels { position: relative; z-index: 5; height: calc(100vh - 52px - 44px); }
    .panel { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity .22s; }
    .panel.active { opacity: 1; pointer-events: auto; }
    .canvas-wrap { width: 100%; height: 100%; overflow: hidden; cursor: grab; position: relative;
      user-select: none; -webkit-user-select: none; }
    .canvas-wrap.dragging { cursor: grabbing; }
    .canvas-wrap.row-mode { user-select: text; -webkit-user-select: text; }
    .canvas-inner { position: absolute; top: 50%; left: 50%; transform-origin: center center; will-change: transform; }
    .diagram-svg svg { filter: drop-shadow(0 2px 32px rgba(0,0,0,.5)); }
    .zoom-ctrl { position: absolute; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 4px; z-index: 30; }
    .z-btn { width: 32px; height: 32px; background: rgba(13,18,32,.9); border: 1px solid var(--border);
      color: var(--text-sec); font-family: var(--font); font-size: 15px; cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; transition: background .15s; backdrop-filter: blur(8px); }
    .z-btn:hover { background: var(--border); color: var(--text-pri); }
    .legend { position: absolute; top: 16px; left: 16px; z-index: 30;
      background: rgba(6,8,16,.88); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px; backdrop-filter: blur(10px); }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 10px; color: var(--text-sec); }
    .legend-row:last-child { margin-bottom: 0; }
    .l-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .db-wrap { display: grid; grid-template-columns: 1fr 300px; height: 100%; }
    .db-canvas-area { display: flex; flex-direction: column; overflow: hidden; }
    .db-canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    .db-sidebar { border-left: 1px solid var(--border); background: rgba(10,14,26,.8);
      backdrop-filter: blur(10px); overflow-y: auto; padding: 18px; }
    .db-sidebar::-webkit-scrollbar { width: 4px; }
    .db-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sidebar-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .table-card { background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
    .table-head { padding: 7px 12px;
      background: linear-gradient(90deg, rgba(15,45,31,.7), rgba(13,18,32,.5));
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; color: var(--green);
      display: flex; align-items: center; gap: 6px; }
    .table-head-icon { font-size: 9px; color: var(--text-muted); }
    .col-row { padding: 4px 12px; font-size: 10px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border-sub); }
    .col-row:last-child { border-bottom: none; }
    .col-name { color: var(--text-sec); }
    .col-type { color: var(--text-muted); font-size: 9px; }
    .col-pk { color: var(--amber); font-size: 8px; font-weight: 700; }
    .col-fk { color: var(--blue); font-size: 8px; font-weight: 700; }
    .table-refs { padding: 5px 12px 7px; border-top: 1px solid var(--border-sub); background: rgba(56,189,248,.04); }
    .refs-label { font-size: 8px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; margin-top: 2px; }
    .ref-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 10px; }
    .ref-comp { color: var(--blue); font-weight: 500; background: rgba(56,189,248,.08);
      padding: 1px 6px; border-radius: 2px; border: 1px solid rgba(56,189,248,.2); }
    .ref-route { color: var(--green); font-weight: 500; background: rgba(74,222,128,.08);
      padding: 1px 6px; border-radius: 2px; border: 1px solid rgba(74,222,128,.2); }
    .ref-action { color: var(--amber); font-weight: 500; background: rgba(245,158,11,.08);
      padding: 1px 6px; border-radius: 2px; border: 1px solid rgba(245,158,11,.2); }
    .fk-arrow { color: var(--amber); margin: 0 4px; }
    .loading-msg { color: var(--text-muted); padding: 40px; font-size: 12px; text-align: center; }
    svg { max-width: none !important; }
    .db-toggle-bar {
      display: flex; align-items: center; gap: 6px; padding: 8px 14px;
      background: rgba(6,8,16,.9); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 20; flex-wrap: wrap;
    }
    .db-toggle-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-right: 4px; }
    .tb-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: var(--font);
      font-size: 10px; font-weight: 500; letter-spacing: 0.3px;
      border: 1px solid var(--border); background: rgba(13,18,32,.7);
      color: var(--text-muted); transition: all .15s; user-select: none;
    }
    .tb-btn:hover { color: var(--text-sec); border-color: var(--text-muted); }
    .tb-btn.active[data-v="fk"]     { color: #38bdf8; border-color: #38bdf8; background: rgba(56,189,248,.1); }
    .tb-btn.active[data-v="routes"] { color: #4ade80; border-color: #4ade80; background: rgba(74,222,128,.1); }
    .tb-btn.active[data-v="actions"]{ color: #f59e0b; border-color: #f59e0b; background: rgba(245,158,11,.1); }
    .tb-btn.active[data-v="all"]    { color: #e2e8f0; border-color: #475569; background: rgba(255,255,255,.06); }
    .tb-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tb-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
    .chunk-nav { position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      z-index: 30; display: flex; align-items: center;
      padding: 3px 12px; border-radius: 4px;
      background: rgba(6,8,16,.88); border: 1px solid var(--border); backdrop-filter: blur(10px); }
    .cn-label { font-size: 10px; color: var(--text-muted); }
    .canvas-wrap.row-mode { overflow: auto; cursor: default; }
    .canvas-wrap.row-mode.dragging { cursor: grabbing; }
    /* v1.1.6 T3 C-2: row-mode inner를 grid로 변경 — chunk가 화면 폭에 따라 자동 wrap.
       16 rows → 2x8 / 4x4 / 1x16 형태로 자동 배치. minmax(560px) = 한 chunk 최소 폭. */
    .canvas-wrap.row-mode .canvas-inner {
      position: static; transform: none !important; top: auto; left: auto;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(560px, 1fr));
      gap: 16px; padding: 16px; width: 100%; box-sizing: border-box;
      user-select: none; -webkit-user-select: none;
    }
    /* v1.1.6 T3 C-1: chunk별 독립 zoom — 각 .row-diagram이 자체 transform 상태를 가진다.
       overflow:hidden으로 chunk 밖으로 빠져나간 SVG를 cell 안에 가둔다.
       cursor:grab으로 chunk-local drag/zoom 가능 표시. */
    .row-diagram {
      display: block; width: 100%; min-height: 200px;
      overflow: hidden; cursor: grab; position: relative;
      background: rgba(13,18,32,.3); border: 1px solid var(--border-sub); border-radius: 6px;
    }
    .row-diagram.dragging { cursor: grabbing; }
    .row-diagram svg { transform-origin: top left; will-change: transform; display: block; }
    /* erDiagram th/td 분리 스타일 (Mermaid 11 기준)
       Mermaid 11은 row-rect-even/odd g 안의 path에 SVG fill 속성으로 색상 지정.
       SVG presentation attribute < CSS 우선순위이므로 CSS override가 유효하다.
       th(g.outer-path): primaryColor(#0a2030) 어두운 배경 + 밝은 텍스트 → 유지
       td even row: 흰색 배경
       td odd row: 연회색 배경
       td 텍스트: 어두운 색으로 강제 */
    .erDiagram g.row-rect-even path { fill: #ffffff !important; }
    .erDiagram g.row-rect-odd path  { fill: #f1f5f9 !important; }
    .erDiagram .label.attribute-type p,
    .erDiagram .label.attribute-name p,
    .erDiagram .label.attribute-keys p,
    .erDiagram .label.attribute-comment p { color: #1e293b !important; font-weight: 500; }
  </style>
</head>
<body>

<header>
  <div class="logo">Code<em>Sight</em></div>
  <div class="badge" id="h-badge">—</div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="header-meta" id="h-meta" data-i18n="status.analyzing">analyzing...</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-t="r" onclick="switchTab('r')"><span class="tab-pip"></span><span data-i18n="tab.rendering">Rendering Architecture</span></div>
  <div class="tab" data-t="s" onclick="switchTab('s')"><span class="tab-pip"></span><span data-i18n="tab.screenComponent">Screen–Component</span></div>
  <div class="tab" data-t="d" onclick="switchTab('d')"><span class="tab-pip"></span><span data-i18n="tab.dbScreen">DB–Screen</span></div>
</div>

<div class="panels">
  <div id="p-r" class="panel active">
    <div class="legend">
      <div class="legend-row"><div class="l-dot" style="background:#16a34a"></div><span data-i18n="legend.ssr">SSR · 서버 렌더링</span></div>
      <div class="legend-row"><div class="l-dot" style="background:#c2410c"></div><span data-i18n="legend.csr">CSR · 클라이언트 렌더링</span></div>
      <div class="legend-row"><div class="l-dot" style="background:#ca8a04"></div><span data-i18n="legend.isr">ISR · 증분 재생성</span></div>
      <div class="legend-row"><div class="l-dot" style="background:#7c3aed"></div><span data-i18n="legend.ssg">SSG · 정적 생성</span></div>
      <div class="legend-row"><div class="l-dot" style="background:#6b7280;border:1px dashed #7dd3fc;border-radius:2px"></div><span data-i18n="legend.inferred">inferred (LLM)</span></div>
      <div class="legend-row"><div class="l-dot" style="background:transparent;border:1px dashed #7dd3fc;border-radius:2px"></div><span data-i18n="legend.feBe">FE→BE 연결 (dashed)</span></div>
    </div>
    <div class="canvas-wrap" id="w-r"><div class="canvas-inner" id="i-r"><div class="loading-msg" data-i18n="status.rendering">렌더링 중...</div></div></div>
    <div id="cnav-r" class="chunk-nav" style="display:none"><span class="cn-label"></span></div>
    <div class="zoom-ctrl">
      <button class="z-btn" onclick="zm('r',1.2)">+</button>
      <button class="z-btn" onclick="zm('r',.833)">−</button>
      <button class="z-btn" onclick="rz('r')" style="font-size:11px">⌂</button>
    </div>
  </div>
  <div id="p-s" class="panel">
    <div class="legend">
      <div class="legend-row"><div class="l-dot" style="background:#16a34a"></div><span data-i18n="legend.ssr">SSR · 서버 렌더링</span></div>
      <div class="legend-row"><div class="l-dot" style="background:#c2410c"></div><span data-i18n="legend.csr">CSR · 클라이언트 렌더링</span></div>
      <div class="legend-row"><div class="l-dot" style="background:#ca8a04"></div><span data-i18n="legend.isr">ISR · 증분 재생성</span></div>
      <div class="legend-row"><div class="l-dot" style="background:#7c3aed"></div><span data-i18n="legend.ssg">SSG · 정적 생성</span></div>
      <div class="legend-row"><div class="l-dot" style="background:#6b7280;border:1px dashed #7dd3fc;border-radius:2px"></div><span data-i18n="legend.inferred">inferred (LLM)</span></div>
    </div>
    <div class="canvas-wrap" id="w-s"><div class="canvas-inner" id="i-s"><div class="loading-msg" data-i18n="status.rendering">렌더링 중...</div></div></div>
    <div id="cnav-s" class="chunk-nav" style="display:none"><span class="cn-label"></span></div>
    <div class="zoom-ctrl">
      <button class="z-btn" onclick="zm('s',1.2)">+</button>
      <button class="z-btn" onclick="zm('s',.833)">−</button>
      <button class="z-btn" onclick="rz('s')" style="font-size:11px">⌂</button>
    </div>
  </div>
  <div id="p-d" class="panel">
    <div class="db-wrap">
      <div class="db-canvas-area">
        <div class="db-toggle-bar">
          <span class="db-toggle-label" data-i18n="db.view.label">View</span>
          <button class="tb-btn active" data-v="all" onclick="setDbView('all')">
            <span class="tb-pip" style="background:linear-gradient(135deg,#38bdf8 33%,#4ade80 66%,#f59e0b 100%)"></span><span data-i18n="db.view.all">전체</span>
          </button>
          <div class="tb-sep"></div>
          <button class="tb-btn" data-v="fk" onclick="setDbView('fk')">
            <span class="tb-pip" style="background:#38bdf8"></span><span data-i18n="db.view.fk">FK 관계</span>
          </button>
          <button class="tb-btn" data-v="routes" onclick="setDbView('routes')">
            <span class="tb-pip" style="background:#4ade80"></span><span data-i18n="db.view.routes">페이지 쿼리</span>
          </button>
          <button class="tb-btn" data-v="actions" onclick="setDbView('actions')">
            <span class="tb-pip" style="background:#f59e0b"></span><span data-i18n="db.view.actions">서버 액션</span>
          </button>
        </div>
        <div class="db-canvas-wrap">
          <div class="canvas-wrap" id="w-d"><div class="canvas-inner" id="i-d"><div class="loading-msg" data-i18n="status.rendering">렌더링 중...</div></div></div>
          <div id="cnav-d" class="chunk-nav" style="display:none"><span class="cn-label"></span></div>
          <div class="zoom-ctrl">
            <button class="z-btn" onclick="zm('d',1.2)">+</button>
            <button class="z-btn" onclick="zm('d',.833)">−</button>
            <button class="z-btn" onclick="rz('d')" style="font-size:11px">⌂</button>
          </div>
        </div>
      </div>
      <div class="db-sidebar">
        <div class="sidebar-label" data-i18n="db.sidebar.tables">Tables</div>
        <div id="sidebar-tables"><div class="loading-msg" data-i18n="status.loading">로딩 중...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Data injection from extension ────────────────────────────────────────────
const meta = window.__CODESIGHT_META__ || {};
const injected = window.__CODESIGHT_DIAGRAMS__ || {};
const I18N = window.__CODESIGHT_I18N__ || {};
function tr(key, params) {
  let s = I18N[key] || key;
  if (params) for (const k in params) s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), String(params[k]));
  return s;
}
// data-i18n attribute로 마크된 모든 element textContent 일괄 치환 (페이지 로드 시 1회)
document.querySelectorAll('[data-i18n]').forEach(function(el) { el.textContent = tr(el.dataset.i18n); });

if (meta.projectName) {
  document.getElementById('h-badge').textContent = meta.projectName;
  const cacheLabel = meta.cachedAt
    ? ' · cached ' + Math.round((Date.now() - meta.cachedAt) / 60000) + 'm ago'
    : '';
  document.getElementById('h-meta').textContent =
    meta.projectName + ' · ' + (meta.routeCount ?? '?') + ' routes · ' + (meta.tableCount ?? '?') + ' tables' + cacheLabel;
}

// Map from DiagramSet keys to r/s/d
const DIAGRAMS = {
  r: injected.rendering      || '',
  s: injected.screenComponent || '',
  d: injected.dbScreen       || '',
};

// ── Runtime ──────────────────────────────────────────────────────────────────
mermaid.initialize({
  startOnLoad: false, securityLevel: 'loose', maxTextSize: 1000000, maxEdges: 2000,
  // ELK 폐기 사유: graph LR에서 라우트/테이블 column 분리로 Tab3 가독성 저하.
  // 인덱스 라우트 등 짧은 라벨 노드가 매우 작아져 Tab2 비율 깨짐.
  // dagre 복귀 + htmlLabels=false (SVG vector text → zoom 시 픽셀화 방지).
  flowchart: { useMaxWidth: false, htmlLabels: false, nodeSpacing: 30, rankSpacing: 50, padding: 8 },
  er: { useMaxWidth: false }
});

// Chunk fallback: renderer/_shared/wrap-fallback.ts emits %%--CHUNK--%% separator
// between sub-diagrams when output exceeds chunkThreshold (default 1M).
// Each chunk is a complete mermaid diagram and must be rendered separately.
const CHUNK_SEP = '%%--CHUNK--%%';
function splitChunks(diagram) {
  if (!diagram || diagram.indexOf(CHUNK_SEP) === -1) return [diagram];
  return diagram.split('\n' + CHUNK_SEP + '\n')
    .map(c => c.replace(/^%% chunk:\d+\/\d+\n/, ''))
    .filter(c => c && c.trim());
}

const GROUPS_PER_ROW = 5;

// erDiagram row-rect 색상 후처리: Mermaid 11은 SVG attribute로 색상을 설정해
// 외부 CSS override가 불가하므로 렌더링 후 setAttribute로 직접 변경한다.
function applyErdColors(svgEl) {
  if (!svgEl) return;
  svgEl.querySelectorAll('g.row-rect-even path[fill]').forEach(p => p.setAttribute('fill', '#ffffff'));
  svgEl.querySelectorAll('g.row-rect-odd path[fill]').forEach(p => p.setAttribute('fill', '#f1f5f9'));
}

async function renderChunked(idPrefix, diagram) {
  const chunks = splitChunks(diagram);
  if (chunks.length <= 1) {
    const {svg} = await mermaid.render(idPrefix+'_'+Date.now(), diagram);
    return svg;
  }
  let combined = '';
  for (let i = 0; i < chunks.length; i++) {
    try {
      const {svg} = await mermaid.render(idPrefix+'_c'+i+'_'+Date.now(), chunks[i]);
      combined += '<div class="row-diagram">'+svg+'</div>';
    } catch(e) {
      combined += '<div class="row-diagram"><pre style="color:#fb923c;font-size:11px;padding:8px">Row '+(i+1)+' error: '+e.message+'</pre></div>';
    }
  }
  return combined;
}

function setSvgDimensions(inner) {
  const svgEl = inner.querySelector('svg');
  if (!svgEl) return;
  const vb = svgEl.viewBox.baseVal;
  if (vb && vb.width > 0) { svgEl.setAttribute('width', vb.width); svgEl.setAttribute('height', vb.height); }
  svgEl.style.maxWidth = 'none';
}

// v1.1.6 T3 C-1: row-mode에서 inline style 제거 — grid CSS class가 layout 담당.
// 각 .row-diagram에 data-row-idx 부여 + ROW_ST 초기화 + chunk별 fit.
function activateRowMode(t, inner) {
  const wrap = document.getElementById('w-'+t);
  wrap.classList.add('row-mode');
  inner.style.cssText = '';
  const rows = inner.querySelectorAll('.row-diagram');
  ROW_ST[t] = [];
  rows.forEach((row, idx) => {
    row.dataset.t = t;
    row.dataset.rowIdx = idx;
    ROW_ST[t].push({s:1, x:0, y:0, natW:0, natH:0, fitS:1});
  });
  fitRowSvgsInitial(t, inner);
  const bar = document.getElementById('cnav-'+t);
  if (bar && rows.length > 1) {
    bar.style.display = 'flex';
    bar.querySelector('.cn-label').textContent = rows.length + ' rows · ' + tr('chunk.suffix');
  }
}

// v1.1.6 T3 C-1: 초기 fit — 각 row-diagram cell 폭에 맞춰 SVG 다운스케일 (fitS 계산).
// 이후 사용자 wheel/drag는 chunk-local로 fitS 위에 추가 변환.
function fitRowSvgsInitial(t, inner) {
  inner.querySelectorAll('.row-diagram').forEach((row, idx) => {
    const svg = row.querySelector('svg');
    if (!svg) return;
    const vb = svg.viewBox.baseVal;
    const natW = (vb && vb.width > 0) ? vb.width : (parseFloat(svg.getAttribute('width')) || 800);
    const natH = (vb && vb.height > 0) ? vb.height : (parseFloat(svg.getAttribute('height')) || 600);
    // row-diagram cell width는 grid가 결정 (minmax(560,1fr)). clientWidth로 측정.
    const cellW = row.clientWidth - 8;
    const fitS = cellW > 0 && natW > 0 ? Math.min(cellW / natW, 1.0) : 1.0;
    // SVG width를 cell에 fit → row-diagram min-height에도 반영
    svg.setAttribute('width', natW);
    svg.setAttribute('height', natH);
    svg.style.maxWidth = 'none';
    if (ROW_ST[t][idx]) {
      ROW_ST[t][idx].natW = natW;
      ROW_ST[t][idx].natH = natH;
      ROW_ST[t][idx].fitS = fitS;
      ROW_ST[t][idx].s = 1;
      ROW_ST[t][idx].x = 0;
      ROW_ST[t][idx].y = 0;
    }
    applyRowTransform(t, idx);
    // row-diagram cell 높이를 SVG 실제 표시 높이에 맞춤 (grid cell 자동 신축)
    row.style.minHeight = (natH * fitS) + 'px';
  });
}

// 하위 호환 (외부 호출 가능성)
function scaleRowSvgs(wrap, inner) {
  const t = wrap.id.slice(2);
  fitRowSvgsInitial(t, inner);
}

// ── DB Multi-View ─────────────────────────────────────────────────────────────
const FLOW_INIT = "%%{init:{'theme':'base','themeVariables':{'background':'#060810','primaryColor':'#0c1a30','primaryTextColor':'#94a3b8','primaryBorderColor':'#1e3a5f','lineColor':'#334155','secondaryColor':'#080f1a','clusterBkg':'#070b18','clusterBorder':'#1e3a5f','fontFamily':'monospace','edgeLabelBackground':'#060810'}}}%%";

const DOMAIN_MAP = [
  {label:'📝 Blog',      keys:['blog']},
  {label:'💬 Guestbook', keys:['guestbook']},
  {label:'👤 User/Auth', keys:['profile','auth','user']},
  {label:'🧑 About',     keys:['about','education','experience','training']},
  {label:'📬 Contact',   keys:['contact','inquir']},
  {label:'📁 Projects',  keys:['project']},
  {label:'📊 Admin',     keys:['skill','page_view','analytic']},
];
function getDomain(name) {
  const lo = name.toLowerCase();
  for (const {label, keys} of DOMAIN_MAP) { if (keys.some(k => lo.includes(k))) return label; }
  return '📦 Other';
}

function parseDbData(erd) {
  const lines = erd.split('\n');
  const tables = {}, proxies = new Set();
  const tableMetaMap = {};
  let cur = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (line.startsWith('%%')) {
      const dm = line.match(/^%%\s+table:(\w+)(?:\s+schema:(\S+))?(?:\s+path:(\S+))?/);
      if (dm && (dm[2] || dm[3])) { tableMetaMap[dm[1]] = {schema: dm[2] || undefined, filePath: dm[3] || undefined}; }
      continue;
    }
    if (!line || line === 'erDiagram') continue;
    const em = line.match(/^(\w+)\s*\{/);
    if (em) { cur = em[1]; if (!tables[cur]) tables[cur]={columns:[],fkOut:[],routeEdges:[],actionEdges:[],schema:undefined,filePath:undefined}; continue; }
    if (line === '}') { cur = null; continue; }
    if (cur) {
      const cm = line.match(/^(\S+)\s+(\S+)(\s+PK)?(\s+FK)?/);
      if (cm) tables[cur].columns.push({type:cm[1],name:cm[2],pk:!!cm[3],fk:!!cm[4]});
    }
  }
  for (const [name, meta] of Object.entries(tableMetaMap)) {
    if (tables[name]) { tables[name].schema = meta.schema; tables[name].filePath = meta.filePath; }
  }
  for (const [k,v] of Object.entries(tables)) {
    if (v.columns.length===1 && v.columns[0].type==='string' && v.columns[0].name==='name') { proxies.add(k); delete tables[k]; }
  }
  const fkEdges=[], routeEdges=[], actionEdges=[];
  for (const raw of lines) {
    const line = raw.trim();
    const fkM = line.match(/^(\w+)\s+\}o--\|\|\s+(\w+)\s+:\s+"(\w+)"/);
    if (fkM && tables[fkM[1]] && tables[fkM[2]]) { fkEdges.push({from:fkM[1],to:fkM[2],col:fkM[3]}); continue; }
    const qM = line.match(/^(\w+)\s+\}.*?\|\|\s+(\w+)\s+:\s+"queries"/);
    if (qM && tables[qM[2]]) {
      const lo = qM[1].toLowerCase();
      const isAction = lo.includes('action')||lo.startsWith('get')||lo.startsWith('upsert')||lo.startsWith('create')||lo.startsWith('delete')||lo.startsWith('update')||lo.startsWith('server');
      const arr = isAction ? actionEdges : routeEdges;
      if (!arr.some(e=>e.from===qM[1]&&e.to===qM[2])) arr.push({from:qM[1],to:qM[2]});
    }
  }
  return {tables, fkEdges, routeEdges, actionEdges};
}

function extractModule(filePath) {
  if (!filePath) return null;
  const srcM = filePath.match(/(?:^|\/)src\/([^/]+)\//);
  if (srcM) return srcM[1];
  // bin/main/sql/primary/** — MyBatis mapper XML (SpringBoot)
  // Take the last directory segment before the filename as module name
  // e.g. bin/main/sql/primary/wina/agency/ApiUrl.xml → 'agency'
  //      bin/main/sql/primary/wina/headOffice/alloc/Sql.xml → 'alloc'
  //      bin/main/sql/primary/core/ApiUrl.xml → 'core'
  const binM = filePath.match(/(?:^|\/)bin\/main\/sql\/primary\/(.+)\/[^/]+\.[^/]+$/);
  if (binM) {
    const parts = binM[1].split('/');
    return parts[parts.length - 1] || parts[0] || null;
  }
  const parts = filePath.replace(/^\//, '').split('/');
  return parts.length > 1 ? parts[0] : null;
}

function sanitizeSgId(label) {
  return label.replace(/[^A-Za-z0-9_]/g, '_');
}

function buildDbGraph(data, showFk, showRoutes, showActions) {
  const {tables, fkEdges, routeEdges, actionEdges} = data;
  const tableNames = Object.keys(tables);
  const hasSchema = tableNames.some(n => tables[n].schema);
  const hasFilePath = tableNames.some(n => tables[n].filePath);
  const groups = {};
  let sgPrefix;
  if (hasSchema) {
    sgPrefix = 'SG_';
    for (const name of tableNames) {
      const key = tables[name].schema || 'other';
      if (!groups[key]) groups[key] = [];
      groups[key].push(name);
    }
  } else if (hasFilePath) {
    sgPrefix = 'MOD_';
    for (const name of tableNames) {
      const key = extractModule(tables[name].filePath) || 'other';
      if (!groups[key]) groups[key] = [];
      groups[key].push(name);
    }
  } else {
    sgPrefix = 'DG';
    for (const name of tableNames) {
      const d = getDomain(name); if (!groups[d]) groups[d]=[];
      groups[d].push(name);
    }
  }
  const groupEntries = Object.entries(groups);
  const totalTables = tableNames.length;
  if (totalTables > 30) {
    const chunks = [];
    let cur = [], curCount = 0;
    for (const entry of groupEntries) {
      const cnt = entry[1].length;
      if (curCount > 0 && curCount + cnt > 30) { chunks.push(cur); cur = [entry]; curCount = cnt; }
      else { cur.push(entry); curCount += cnt; }
    }
    if (cur.length > 0) chunks.push(cur);
    if (chunks.length > 1) {
      return chunks.map(r => buildSingleDbGraph(r, sgPrefix, fkEdges, routeEdges, actionEdges, showFk, showRoutes, showActions)).join('\n'+CHUNK_SEP+'\n');
    }
  }
  return buildSingleDbGraph(groupEntries, sgPrefix, fkEdges, routeEdges, actionEdges, showFk, showRoutes, showActions);
}

// Y축 줄넘김: subgraph 안 노드 5+ 면 invisible inner subgraph로 N개씩 분할 (X축 GROUPS_PER_ROW=5와 대칭)
const NODES_PER_INNER_ROW = 5;
function emitInnerRowsViewer(indent, outerId, items, renderItem) {
  const lines = [];
  if (items.length <= NODES_PER_INNER_ROW) {
    for (const it of items) lines.push(indent + renderItem(it));
    return lines;
  }
  const i2 = indent + '  ';
  for (let i = 0, row = 0; i < items.length; i += NODES_PER_INNER_ROW, row++) {
    const rowId = outerId + '_R' + row;
    lines.push(indent + 'subgraph ' + rowId + ' [" "]');
    lines.push(i2 + 'direction LR');
    const slice = items.slice(i, i + NODES_PER_INNER_ROW);
    for (const it of slice) lines.push(i2 + renderItem(it));
    lines.push(indent + 'end');
    lines.push(indent + 'style ' + rowId + ' fill:none,stroke:none');
  }
  return lines;
}

function buildSingleDbGraph(groupEntries, sgPrefix, fkEdges, routeEdges, actionEdges, showFk, showRoutes, showActions) {
  const rowSet = new Set(groupEntries.flatMap(([,names]) => names));
  const lines = [FLOW_INIT, 'graph LR'];
  lines.push('  classDef tbl fill:#0c1a30,stroke:#334155,color:#7dd3fc,rx:4');
  lines.push('  classDef route fill:#0a180a,stroke:#166534,color:#4ade80,rx:3');
  lines.push('  classDef action fill:#1a0e00,stroke:#92400e,color:#fbbf24,rx:3');
  let dgIdx = 0;
  for (const [label, names] of groupEntries) {
    const id = sgPrefix === 'DG' ? 'DG'+dgIdx++ : sgPrefix+sanitizeSgId(label);
    lines.push('  subgraph '+id+'["'+label+'"]');
    lines.push(...emitInnerRowsViewer('    ', id, names, n => n+'["'+n+'"]:::tbl'));
    lines.push('  end');
  }
  const routeSrcs = [], actionSrcs = [];
  if (showRoutes) for (const e of routeEdges) { if (rowSet.has(e.to) && !routeSrcs.includes(e.from)) routeSrcs.push(e.from); }
  if (showActions) for (const e of actionEdges) { if (rowSet.has(e.to) && !actionSrcs.includes(e.from)) actionSrcs.push(e.from); }
  // graph LR에서 free 소스 노드는 Y축으로 쌓여 폭발하므로 Pages/Actions subgraph + inner-row 분할.
  if (routeSrcs.length > 0) {
    lines.push('  subgraph PAGES_SRC["⬡ Pages"]');
    lines.push(...emitInnerRowsViewer('    ', 'PAGES_SRC', routeSrcs, n => n+'["⬡ '+n+'"]:::route'));
    lines.push('  end');
  }
  if (actionSrcs.length > 0) {
    lines.push('  subgraph ACTIONS_SRC["⚡ Actions"]');
    lines.push(...emitInnerRowsViewer('    ', 'ACTIONS_SRC', actionSrcs, n => n+'["⚡ '+n+'"]:::action'));
    lines.push('  end');
  }
  const edgeColors = [];
  if (showFk) for (const e of fkEdges) {
    if (rowSet.has(e.from) && rowSet.has(e.to)) { lines.push('  '+e.from+' -->|"'+e.col+'"| '+e.to); edgeColors.push('#38bdf8'); }
  }
  if (showRoutes) for (const e of routeEdges) {
    if (rowSet.has(e.to)) { lines.push('  '+e.from+' --> '+e.to); edgeColors.push('#4ade80'); }
  }
  if (showActions) for (const e of actionEdges) {
    if (rowSet.has(e.to)) { lines.push('  '+e.from+' --> '+e.to); edgeColors.push('#f59e0b'); }
  }
  edgeColors.forEach((c,i) => lines.push('  linkStyle '+i+' stroke:'+c+',stroke-width:2px'));
  if (!edgeColors.length && groupEntries.length===0) lines.push('  empty["(No data)"]');
  return lines.join('\n');
}

async function renderDbView(view) {
  const inner = document.getElementById('i-d');
  inner.innerHTML = '<div class="loading-msg">' + tr('status.rendering') + '</div>';
  if (!DIAGRAMS.d) { inner.innerHTML = '<div class="loading-msg">' + tr('status.noDbData') + '</div>'; return; }
  try {
    if (!dbGraphs) {
      const data = parseDbData(DIAGRAMS.d);
      dbGraphs = {
        fk:      buildDbGraph(data,true, false,false),
        routes:  buildDbGraph(data,false,true, false),
        actions: buildDbGraph(data,false,false,true),
        all:     buildDbGraph(data,true, true, true),
        _data: data
      };
    }
    const diag = dbGraphs[view] || dbGraphs.fk;
    const html = await renderChunked('dbsvg_'+view, diag);
    inner.innerHTML = html;
    // erDiagram이 렌더링된 경우 row-rect 색상 후처리 적용
    inner.querySelectorAll('svg.erDiagram, svg[class*="er"]').forEach(applyErdColors);
    if (inner.querySelector('.row-diagram')) {
      activateRowMode('d', inner);
    } else {
      setSvgDimensions(inner);
      fitToView('d');
    }
  } catch(e) {
    inner.innerHTML = '<pre style="color:#fb923c;padding:20px;font-size:11px">'+e.message+'</pre>';
  }
}

function setDbView(view) {
  dbCurrentView = view;
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.toggle('active', b.dataset.v===view));
  const wrap = document.getElementById('w-d');
  wrap.classList.remove('row-mode');
  document.getElementById('i-d').style.cssText = '';
  ST.d = {s:1,x:0,y:0};
  ROW_ST.d = [];
  const cnav = document.getElementById('cnav-d');
  if (cnav) cnav.style.display = 'none';
  renderDbView(view);
}

function fitToView(t) {
  const wrap = document.getElementById('w-'+t);
  const inner = document.getElementById('i-'+t);
  if (!wrap || !inner) return;
  if (wrap.classList.contains('row-mode')) {
    // v1.1.6 T3 C-1: row-mode reset — 모든 chunk의 zoom/pan을 fit 상태로 복원.
    (ROW_ST[t] || []).forEach((st, idx) => {
      st.s = 1; st.x = 0; st.y = 0;
      applyRowTransform(t, idx);
    });
    return;
  }
  const svg = inner.querySelector('svg');
  if (!svg) return;
  const wW = wrap.clientWidth, wH = wrap.clientHeight;
  let sW = parseFloat(svg.getAttribute('width')) || svg.clientWidth || 800;
  let sH = parseFloat(svg.getAttribute('height')) || svg.clientHeight || 600;
  if (sW < 10) sW = 800; if (sH < 10) sH = 600;
  const s = Math.min(wW*0.88/sW, wH*0.88/sH, 1.0);
  ST[t] = {s, x:0, y:0};
  applyTransform(t);
}

function applyTransform(t) {
  const wrap = document.getElementById('w-'+t);
  const inner = document.getElementById('i-'+t);
  if (!wrap || !inner) return;
  if (wrap.classList.contains('row-mode')) {
    // row-mode는 chunk-local. applyRowTransform 사용.
    return;
  }
  const {s,x,y} = ST[t];
  inner.style.transform = 'translate(calc(-50% + '+x+'px), calc(-50% + '+y+'px)) scale('+s+')';
}

// v1.1.6 T3 C-1: chunk-local transform — fitS(cell fit) × s(사용자 zoom) 결합.
function applyRowTransform(t, idx) {
  const inner = document.getElementById('i-'+t);
  if (!inner) return;
  const row = inner.querySelector('.row-diagram[data-row-idx="'+idx+'"]');
  if (!row) return;
  const svg = row.querySelector('svg');
  if (!svg) return;
  const st = ROW_ST[t][idx];
  if (!st) return;
  const totalS = st.fitS * st.s;
  svg.style.transform = 'translate('+st.x+'px, '+st.y+'px) scale('+totalS+')';
}

function zm(t, f) {
  const wrap = document.getElementById('w-'+t);
  if (wrap && wrap.classList.contains('row-mode')) {
    // row-mode: 모든 chunk에 동일 zoom 적용 (전역 +/- 버튼 동작).
    (ROW_ST[t] || []).forEach((st, idx) => {
      st.s = Math.max(0.1, Math.min(st.s*f, 5));
      applyRowTransform(t, idx);
    });
    return;
  }
  ST[t].s = Math.max(0.1, Math.min(ST[t].s*f, 5));
  applyTransform(t);
}
function rz(t) { fitToView(t); }

document.addEventListener('mousedown', e => {
  const row = e.target.closest('.row-diagram');
  if (row && row.dataset.t) {
    e.preventDefault();
    const t = row.dataset.t;
    const idx = parseInt(row.dataset.rowIdx, 10);
    const st = ROW_ST[t][idx];
    if (!st) return;
    drag.t=t; drag.rowIdx=idx; drag.sx=e.clientX; drag.sy=e.clientY; drag.ox=st.x; drag.oy=st.y;
    row.classList.add('dragging');
    return;
  }
  const wrap = e.target.closest('.canvas-wrap');
  if (!wrap || wrap.classList.contains('row-mode')) return;
  e.preventDefault();
  const t = wrap.id.slice(2);
  drag.t=t; drag.rowIdx=null; drag.sx=e.clientX; drag.sy=e.clientY; drag.ox=ST[t].x; drag.oy=ST[t].y;
  wrap.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!drag.t) return;
  if (drag.rowIdx !== null) {
    const st = ROW_ST[drag.t][drag.rowIdx];
    if (!st) return;
    st.x = drag.ox+(e.clientX-drag.sx);
    st.y = drag.oy+(e.clientY-drag.sy);
    applyRowTransform(drag.t, drag.rowIdx);
    return;
  }
  ST[drag.t].x = drag.ox+(e.clientX-drag.sx);
  ST[drag.t].y = drag.oy+(e.clientY-drag.sy);
  applyTransform(drag.t);
});
document.addEventListener('mouseup', () => {
  if (drag.rowIdx !== null) {
    const inner = document.getElementById('i-'+drag.t);
    inner?.querySelector('.row-diagram[data-row-idx="'+drag.rowIdx+'"]')?.classList.remove('dragging');
  } else if (drag.t) {
    document.getElementById('w-'+drag.t)?.classList.remove('dragging');
  }
  drag.t=null; drag.rowIdx=null;
});
// v1.1.6 T3 C-1: wheel은 hover된 .row-diagram에만 적용 (chunk-local zoom).
// row-mode 외부 / single SVG 모드는 기존 canvas-wrap 전체 zoom.
document.addEventListener('wheel', e => {
  const row = e.target.closest('.row-diagram');
  if (row && row.dataset.t) {
    e.preventDefault();
    const t = row.dataset.t;
    const idx = parseInt(row.dataset.rowIdx, 10);
    const st = ROW_ST[t][idx];
    if (!st) return;
    const f = e.deltaY<0?1.1:0.9;
    st.s = Math.max(0.1, Math.min(st.s*f, 5));
    applyRowTransform(t, idx);
    return;
  }
  const wrap = e.target.closest('.canvas-wrap');
  if (!wrap || wrap.classList.contains('row-mode')) return;
  e.preventDefault();
  zm(wrap.id.slice(2), e.deltaY<0?1.1:0.9);
}, {passive:false});

function buildSidebar(erDiagram) {
  if (!erDiagram) { document.getElementById('sidebar-tables').innerHTML = '<div style="color:var(--text-muted);font-size:11px;padding:8px">No DB data</div>'; return; }
  const lines = erDiagram.split('\n');
  const tables = {}, proxies = new Set();
  let current = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('%%') || line === 'erDiagram') continue;
    const em = line.match(/^(\w+)\s*\{/);
    if (em) { current = em[1]; if (!tables[current]) tables[current] = {columns:[],fkOut:[],usedBy:[]}; continue; }
    if (line === '}') { current = null; continue; }
    if (current) {
      const cm = line.match(/^(\S+)\s+(\S+)(\s+PK)?(\s+FK)?/);
      if (cm) tables[current].columns.push({type:cm[1], name:cm[2], pk:!!cm[3], fk:!!cm[4]});
    }
  }
  for (const [k, v] of Object.entries(tables)) {
    if (v.columns.length === 1 && v.columns[0].type === 'string' && v.columns[0].name === 'name') { proxies.add(k); delete tables[k]; }
  }
  for (const raw of lines) {
    const line = raw.trim();
    const fkM = line.match(/^(\w+)\s+\}o--\|\|\s+(\w+)\s+:\s+"(\w+)"/);
    if (fkM && tables[fkM[1]]) { tables[fkM[1]].fkOut.push({col:fkM[3], toTable:fkM[2]}); continue; }
    const qM = line.match(/^(\w+)\s+\}.*?\|\|\s+(\w+)\s+:\s+"queries"/);
    if (qM) {
      const [,src,tbl] = qM;
      if (!tables[tbl]) continue;
      if (tables[tbl].usedBy.some(u => u.name === src)) continue;
      const lo = src.toLowerCase();
      const kind = lo.includes('action')||lo.startsWith('get')||lo.startsWith('upsert')||lo.startsWith('create')||lo.startsWith('delete') ? 'action'
                 : (proxies.has(src)||lo.includes('page')||lo.startsWith('about')||lo.startsWith('blog')||lo.startsWith('admin')) ? 'route' : 'comp';
      tables[tbl].usedBy.push({name:src, kind});
    }
  }
  const container = document.getElementById('sidebar-tables');
  const names = Object.keys(tables);
  if (!names.length) { container.innerHTML = '<div style="color:var(--text-muted);font-size:11px;padding:8px">' + tr('status.noTables') + '</div>'; return; }
  container.innerHTML = names.map(name => {
    const t = tables[name];
    const cols = t.columns.map(c => {
      const b = c.pk ? '<span class="col-pk">PK</span>' : c.fk ? '<span class="col-fk">FK</span>' : '<span></span>';
      return '<div class="col-row"><span class="col-name">'+c.name+'</span>'+b+'<span class="col-type">'+c.type+'</span></div>';
    }).join('');
    const fkHtml = t.fkOut.length
      ? '<div class="table-refs" style="background:rgba(245,158,11,.04);border-top:1px solid var(--border-sub)"><div class="refs-label" style="color:#b45309">' + tr('card.fk') + '</div>'+
        t.fkOut.map(f=>'<div class="ref-row"><span class="ref-action" style="font-size:9px">'+f.col+'</span><span class="fk-arrow"> → </span><span class="ref-route" style="font-size:9px">'+f.toTable+'</span></div>').join('')+'</div>' : '';
    const usedHtml = t.usedBy.length
      ? '<div class="table-refs"><div class="refs-label">' + tr('card.usedBy') + '</div>'+
        t.usedBy.map(u => {
          const cls = u.kind==='route'?'ref-route':u.kind==='action'?'ref-action':'ref-comp';
          const pre = u.kind==='route'?'⬡ ':u.kind==='action'?'⚡ ':'';
          return '<div class="ref-row"><span class="'+cls+'">'+pre+u.name+'</span></div>';
        }).join('')+'</div>' : '';
    return '<div class="table-card"><div class="table-head"><span class="table-head-icon">◈</span>'+name+'</div>'+cols+fkHtml+usedHtml+'</div>';
  }).join('');
}

// ── VS Code API bridge ────────────────────────────────────────────────────────
const vsApi = (typeof acquireVsCodeApi !== 'undefined') ? acquireVsCodeApi() : null;

function postMsg(msg) {
  if (vsApi) { vsApi.postMessage(msg); return; }
  // browser fallback: blob download
  const { format, data, filename } = msg;
  let href;
  if (format === 'png') { href = data; }
  else {
    const mime = format === 'svg' ? 'image/svg+xml' : 'text/markdown';
    href = URL.createObjectURL(new Blob([data], {type: mime}));
  }
  const a = document.createElement('a');
  a.href = href; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  if (format !== 'png') setTimeout(() => URL.revokeObjectURL(href), 1000);
}

// ── Messages from extension ───────────────────────────────────────────────────
window.addEventListener('message', function(event) {
  var msg = event.data;
  if (!msg || !msg.type) return;
  if (msg.type === 'triggerExport') {
    if (msg.format === 'png') exportPng(activeTab);
    else if (msg.format === 'svg') exportSvg(activeTab);
    else if (msg.format === 'md') exportMd();
  }
});

// ── Export ────────────────────────────────────────────────────────────────────

// Returns the Mermaid source for a tab, building DB "all" view on demand
function getDiagramSource(t) {
  if (t === 'd') {
    if (!DIAGRAMS.d) return null;
    if (!dbGraphs) {
      var data = parseDbData(DIAGRAMS.d);
      dbGraphs = {
        fk:      buildDbGraph(data, true,  false, false),
        routes:  buildDbGraph(data, false, true,  false),
        actions: buildDbGraph(data, false, false, true),
        all:     buildDbGraph(data, true,  true,  true),
        _data:   data,
      };
    }
    return dbGraphs[dbCurrentView] || dbGraphs.fk;
  }
  return DIAGRAMS[t] || null;
}

// Returns SVG string for tab: uses DOM if already rendered, else renders on-demand
async function getSvgString(t) {
  var domSvg = document.getElementById('i-'+t)?.querySelector('svg');
  if (domSvg) {
    var clone = domSvg.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.style.background = '#060810';
    return new XMLSerializer().serializeToString(clone);
  }
  // On-demand render
  var diagram = getDiagramSource(t);
  if (!diagram) return null;
  var result = await mermaid.render('expsvg_'+t+'_'+Date.now(), diagram);
  var tmp = document.createElement('div');
  tmp.innerHTML = result.svg;
  var el = tmp.querySelector('svg');
  if (el) {
    el.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    el.style.background = '#060810';
    return new XMLSerializer().serializeToString(el);
  }
  return result.svg;
}

async function exportSvg(t) {
  var tab = t || activeTab;
  try {
    var str = await getSvgString(tab);
    if (!str) { alert(tr('alert.noDiagram')); return; }
    postMsg({type:'export', format:'svg', data:str, filename:(meta.projectName||'codesight')+'-'+tab+'.svg'});
  } catch(e) { alert(tr('alert.svgFailed') + ': ' + e.message); }
}

async function exportPng(t) {
  var tab = t || activeTab;
  try {
    var str = await getSvgString(tab);
    if (!str) { alert(tr('alert.noDiagram')); return; }
    var scale = 2;
    var svgBlob = new Blob([str], {type:'image/svg+xml'});
    var url = URL.createObjectURL(svgBlob);
    await new Promise((resolve, reject) => {
      var img = new Image();
      img.onload = () => {
        var w = img.naturalWidth  || 1200;
        var h = img.naturalHeight || 800;
        var canvas = document.createElement('canvas');
        canvas.width = w * scale; canvas.height = h * scale;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#060810';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        try {
          postMsg({type:'export', format:'png', data:canvas.toDataURL('image/png'),
            filename:(meta.projectName||'codesight')+'-'+tab+'.png'});
          resolve();
        } catch(e) {
          // canvas tainted → fall back to SVG
          exportSvg(tab).then(resolve).catch(reject);
        }
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error(tr('alert.imageLoadFailed'))); };
      img.src = url;
    });
  } catch(e) { alert(tr('alert.pngFailed') + ': ' + e.message); }
}

function exportMd() {
  var labels = {r: tr('tab.rendering'), s: tr('tab.screenComponent'), d: tr('export.dbScreenAll')};
  // DB-Screen: always use "all" view (shows FK + page queries + server actions)
  var dbDiagram = '';
  if (DIAGRAMS.d) {
    if (!dbGraphs) {
      var data = parseDbData(DIAGRAMS.d);
      dbGraphs = {
        fk:      buildDbGraph(data, true,  false, false),
        routes:  buildDbGraph(data, false, true,  false),
        actions: buildDbGraph(data, false, false, true),
        all:     buildDbGraph(data, true,  true,  true),
        _data:   data,
      };
    }
    dbDiagram = dbGraphs.all || '';
  }
  var diagramMap = {r: DIAGRAMS.r, s: DIAGRAMS.s, d: dbDiagram};
  var sections = Object.entries(diagramMap)
    .filter(([,v]) => v)
    .map(([k,v]) => '## '+labels[k]+'\n\n```mermaid\n'+v+'\n```')
    .join('\n\n');
  var hdr = '# CodeSight — '+(meta.projectName||'Project')+'\n\n'+
    '> '+(meta.routeCount??'?')+tr('export.routes')+' · '+(meta.tableCount??'?')+tr('export.tables')+'\n';
  postMsg({type:'export', format:'md', data:hdr+'\n'+sections+'\n',
    filename:(meta.projectName||'codesight')+'.md'});
}

renderTab('r');

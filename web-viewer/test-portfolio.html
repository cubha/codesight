<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codebase Viz — fa-support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg-deep: #060810; --bg-surface: #0a0e1a; --bg-card: #0d1220;
      --border: #162035; --border-sub: #0f172a;
      --text-pri: #e2e8f0; --text-sec: #94a3b8; --text-muted: #475569;
      --blue: #38bdf8; --green: #4ade80; --amber: #f59e0b;
      --font: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg-deep); color: var(--text-pri); }
    body::before { content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, #1e2d4d 1px, transparent 1px);
      background-size: 28px 28px; opacity: 0.3; pointer-events: none; z-index: 0; }
    header { position: relative; z-index: 20; display: flex; align-items: center; gap: 14px;
      padding: 0 24px; height: 52px; background: rgba(6,8,16,0.92);
      border-bottom: 1px solid var(--border); backdrop-filter: blur(16px); }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-pri); }
    .logo em { font-style: normal; color: var(--blue); }
    .badge { font-size: 10px; font-weight: 500; letter-spacing: 0.8px;
      background: rgba(56,189,248,.08); border: 1px solid rgba(56,189,248,.22);
      color: var(--blue); padding: 2px 9px; border-radius: 3px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
    .header-meta { font-size: 10px; color: var(--text-muted); letter-spacing: 0.3px; }
    .tabs { position: relative; z-index: 20; display: flex; padding: 0 24px;
      background: rgba(6,8,16,0.88); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
    .tab { position: relative; padding: 13px 18px; font-size: 11px; font-weight: 500; letter-spacing: 0.4px;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s; user-select: none; }
    .tab:hover { color: var(--text-sec); }
    .tab[data-t="r"].active { color: var(--blue);  border-bottom-color: var(--blue); }
    .tab[data-t="s"].active { color: var(--green); border-bottom-color: var(--green); }
    .tab[data-t="d"].active { color: var(--amber); border-bottom-color: var(--amber); }
    .tab-pip { display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      margin-right: 8px; vertical-align: middle; opacity: 0.7; }
    .tab[data-t="r"] .tab-pip { background: var(--blue); }
    .tab[data-t="s"] .tab-pip { background: var(--green); }
    .tab[data-t="d"] .tab-pip { background: var(--amber); }
    .panels { position: relative; z-index: 5; height: calc(100vh - 52px - 44px); }
    .panel { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity .22s; }
    .panel.active { opacity: 1; pointer-events: auto; }
    .canvas-wrap { width: 100%; height: 100%; overflow: hidden; cursor: grab; position: relative; }
    .canvas-wrap.dragging { cursor: grabbing; }
    .canvas-inner { position: absolute; top: 50%; left: 50%; transform-origin: center center; will-change: transform; }
    .diagram-svg svg { filter: drop-shadow(0 2px 32px rgba(0,0,0,.5)); }
    .zoom-ctrl { position: absolute; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 4px; z-index: 30; }
    .z-btn { width: 32px; height: 32px; background: rgba(13,18,32,.9); border: 1px solid var(--border);
      color: var(--text-sec); font-family: var(--font); font-size: 15px; cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; transition: background .15s; backdrop-filter: blur(8px); }
    .z-btn:hover { background: var(--border); color: var(--text-pri); }
    .legend { position: absolute; top: 16px; left: 16px; z-index: 30;
      background: rgba(6,8,16,.88); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px; backdrop-filter: blur(10px); }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 10px; color: var(--text-sec); }
    .legend-row:last-child { margin-bottom: 0; }
    .l-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .db-wrap { display: grid; grid-template-columns: 1fr 300px; height: 100%; }
    .db-canvas-area { overflow: hidden; }
    .db-canvas-wrap { position: relative; }
    .db-sidebar { border-left: 1px solid var(--border); background: rgba(10,14,26,.8);
      backdrop-filter: blur(10px); overflow-y: auto; padding: 18px; }
    .db-sidebar::-webkit-scrollbar { width: 4px; }
    .db-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sidebar-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .table-card { background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
    .table-head { padding: 7px 12px;
      background: linear-gradient(90deg, rgba(15,45,31,.7), rgba(13,18,32,.5));
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; color: var(--green);
      display: flex; align-items: center; gap: 6px; }
    .table-head-icon { font-size: 9px; color: var(--text-muted); }
    .col-row { padding: 4px 12px; font-size: 10px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border-sub); }
    .col-row:last-child { border-bottom: none; }
    .col-name { color: var(--text-sec); }
    .col-type { color: var(--text-muted); font-size: 9px; }
    .col-pk { color: var(--amber); font-size: 8px; font-weight: 700; }
    .col-fk { color: var(--blue); font-size: 8px; font-weight: 700; }
    .table-refs { padding: 5px 12px 7px; border-top: 1px solid var(--border-sub); background: rgba(56,189,248,.04); }
    .refs-label { font-size: 8px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; margin-top: 2px; }
    .ref-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 10px; }
    .ref-comp { color: var(--blue); font-weight: 500; background: rgba(56,189,248,.08);
      padding: 1px 6px; border-radius: 2px; border: 1px solid rgba(56,189,248,.2); }
    .ref-route { color: var(--green); font-weight: 500; background: rgba(74,222,128,.08);
      padding: 1px 6px; border-radius: 2px; border: 1px solid rgba(74,222,128,.2); }
    .ref-action { color: var(--amber); font-weight: 500; background: rgba(245,158,11,.08);
      padding: 1px 6px; border-radius: 2px; border: 1px solid rgba(245,158,11,.2); }
    .fk-ref { color: var(--text-muted); font-size: 9px; margin-left: 4px; }
    .fk-card { background: rgba(30,64,96,.15); border: 1px solid rgba(30,64,96,.4);
      border-radius: 4px; padding: 5px 10px; margin-bottom: 6px; font-size: 10px; }
    .fk-arrow { color: var(--amber); margin: 0 4px; }
    .loading-msg { color: var(--text-muted); padding: 40px; font-size: 12px; text-align: center; }
    svg { max-width: none !important; }

    /* DB toggle bar */
    .db-canvas-area { display: flex; flex-direction: column; }
    .db-toggle-bar {
      display: flex; align-items: center; gap: 6px; padding: 8px 14px;
      background: rgba(6,8,16,.9); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 20; flex-wrap: wrap;
    }
    .db-toggle-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-right: 4px; }
    .tb-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: var(--font);
      font-size: 10px; font-weight: 500; letter-spacing: 0.3px;
      border: 1px solid var(--border); background: rgba(13,18,32,.7);
      color: var(--text-muted); transition: all .15s; user-select: none;
    }
    .tb-btn:hover { color: var(--text-sec); border-color: var(--text-muted); }
    .tb-btn.active[data-v="fk"]     { color: #38bdf8; border-color: #38bdf8; background: rgba(56,189,248,.1); }
    .tb-btn.active[data-v="routes"] { color: #4ade80; border-color: #4ade80; background: rgba(74,222,128,.1); }
    .tb-btn.active[data-v="actions"]{ color: #f59e0b; border-color: #f59e0b; background: rgba(245,158,11,.1); }
    .tb-btn.active[data-v="all"]    { color: #e2e8f0; border-color: #475569; background: rgba(255,255,255,.06); }
    .tb-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tb-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
    .db-canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  </style>
</head>
<body>

<header>
  <div class="logo">Code<em>Sight</em></div>
  <div class="badge">fa-support</div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="header-meta">fa-support · Monorepo · LLM 분석</div>
  </div>
</header>

</div>

<div class="panels">

  <div id="p-s" class="panel">

      <div class="legend-row"><div class="l-dot" style="background:#c2410c"></div>CSR · 클라이언트 렌더링</div>
      <div class="legend-row"><div class="l-dot" style="background:#ca8a04"></div>ISR · 증분 재생성</div>
      <div class="legend-row"><div class="l-dot" style="background:#7c3aed"></div>SSG · 정적 생성</div>
      <div class="legend-row"><div class="l-dot" style="background:#6b7280;border:1px dashed #7dd3fc;border-radius:2px"></div>inferred (LLM)</div>
    </div>
    <div class="canvas-wrap" id="w-s"><div class="canvas-inner" id="i-s"><div class="loading-msg">렌더링 중...</div></div></div>

          </button>

</div>

<script>

const DIAGRAMS = {
  r: "%%{init:{'theme':'base','themeVariables':{'background':'#060810','primaryColor':'#0c1a30','primaryTextColor':'#7dd3fc','primaryBorderColor':'#0e3a6e','edgeLabelBackground':'#0c1a30','lineColor':'#334155','secondaryColor':'#0f172a','clusterBkg':'#060c18','clusterBorder':'#1e3a5f','fontFamily':'JetBrains Mono'}}}%%\ngraph TD\n  classDef ssr fill:#0d1a0d,stroke:#16a34a,color:#86efac\n  classDef csr fill:#2d1200,stroke:#c2410c,color:#fb923c\n  classDef ssg fill:#1a0d1a,stroke:#7c3aed,color:#c4b5fd\n  classDef isr fill:#1a1a0d,stroke:#ca8a04,color:#fde047\n  classDef ppr fill:#0d1a2d,stroke:#2563eb,color:#93c5fd\n  classDef unk fill:#1a1a1a,stroke:#6b7280,color:#9ca3af\n  subgraph INFRA[\"\u2601 VERCEL \u00b7 Edge Network\"]\n    subgraph RUNTIME[\"\u2699 Node.js \u00b7 Server Runtime\"]\n      subgraph FRAMEWORK[\"\u25b2 Next.js \u00b7 App Router\"]\n        subgraph REACT[\"\u269b React \u00b7 SSR Engine\"]\n          subgraph SHARE_G[\"\ud83d\udcc4 /share\"]\n            route_apps_admin_src_app__public__share__token__page_tsx__share__token_[\"/share/[token] \u00b7 ISR\"]:::isr\n          end\n          subgraph DASHBOARD_G[\"\ud83d\udcc4 /dashboard\"]\n            route_apps_admin_src_app_dashboard_ad_review_page_tsx__dashboard_ad_review[\"/dashboard/ad-review \u00b7 ISR\"]:::isr\n            route_apps_admin_src_app_dashboard_compliance_page_tsx__dashboard_compliance[\"/dashboard/compliance \u00b7 SSR\"]:::ssr\n            route_apps_admin_src_app_dashboard_crm_contracts_page_tsx__dashboard_crm_contracts[\"/dashboard/crm/contracts \u00b7 SSR\"]:::ssr\n            route_apps_admin_src_app_dashboard_crm_page_tsx__dashboard_crm[\"/dashboard/crm \u00b7 SSR\"]:::ssr\n            route_apps_admin_src_app_dashboard_education_page_tsx__dashboard_education[\"/dashboard/education \u00b7 SSR\"]:::ssr\n            route_apps_admin_src_app_dashboard_newsfeed_page_tsx__dashboard_newsfeed[\"/dashboard/newsfeed \u00b7 SSR\"]:::ssr\n            route_apps_admin_src_app_dashboa const ST = {r:{s:1,x:0,y:0}, s:{s:1,x:0,y:0}, d:{s:1,x:0,y:0}};
const drag = {t:null,sx:0,sy:0,ox:0,oy:0};
let dbCurrentView = 'fk';
let dbGraphs = null;

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.querySelector('.tab[data-t="'+t+'"]').classList.add('active');
  document.getElementById('p-'+t).classList.add('active');
  if (!rendered[t]) renderTab(t);
}

async function renderTab(t) {
  rendered[t] = true;
  if (t === 'd') { await renderDbView(dbCurrentView); buildSidebar(DIAGRAMS.d); return; }
  const inner = document.getElementById('i-'+t);
  try {
    const id = 'msvg_'+t+'_'+Date.now();
    const {svg} = await mermaid.render(id, DIAGRAMS[t]);
    inner.innerHTML = svg;
    const svgEl = inner.querySelector('svg');
    if (svgEl) {
      const vb = svgEl.viewBox.baseVal;
      if (vb && vb.width > 0) { svgEl.setAttribute('width', vb.width); svgEl.setAttribute('height', vb.height); }
      svgEl.style.maxWidth = 'none';
    }
    fitToView(t);
  } catch(e) {
    inner.innerHTML = '<pre style="color:#fb923c;padding:20px;font-size:11px">Render error: '+e.message+'</pre>';
  }
}

// ── DB Multi-View System ──────────────────────────────────────────────────────

const FLOW_INIT = "%%{init:{'theme':'base','themeVariables':{'background':'#060810','primaryColor':'#0c1a30','primaryTextColor':'#94a3b8','primaryBorderColor':'#1e3a5f','lineColor':'#334155','secondaryColor':'#080f1a','clusterBkg':'#070b18','clusterBorder':'#1e3a5f','fontFamily':'JetBrains Mono','edgeLabelBackground':'#060810'}}}%%";

const DOMAIN_MAP = [
  {label:'📝 Blog',      keys:['blog']},
  {label:'💬 Guestbook', keys:['guestbook']},
  {label:'👤 User/Auth', keys:['profile','auth']},
  {label:'🧑 About',     keys:['about','education','experience','training']},
  {label:'📬 Contact',   keys:['contact','inquir']},
  {label:'📁 Projects',  keys:['project']},
  {label:'📊 Admin',     keys:['skill','page_view','analytic']},
];
function getDomain(name) {
  const lo = name.toLowerCase();
  for (const {label, keys} of DOMAIN_MAP) { if (keys.some(k => lo.includes(k))) return label; }
  return '📦 Other';
}

function parseDbData(erd) {
  const lines = erd.split('\n');
  const tables = {}, proxies = new Set();
  let cur = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('%%') || line === 'erDiagram') continue;
    const em = line.match(/^(\w+)\s*\{/);
    if (em) { cur = em[1]; if (!tables[cur]) tables[cur]={columns:[],fkOut:[],routeEdges:[],actionEdges:[]}; continue; }
    if (line === '}') { cur = null; continue; }
    if (cur) {
      const cm = line.match(/^(\S+)\s+(\S+)(\s+PK)?(\s+FK)?/);
      if (cm) tables[cur].columns.push({type:cm[1],name:cm[2],pk:!!cm[3],fk:!!cm[4]});
    }
  }
  // remove proxies
  for (const [k,v] of Object.entries(tables)) {
    if (v.columns.length===1 && v.columns[0].type==='string' && v.columns[0].name==='name') { proxies.add(k); delete tables[k]; }
  }
  const fkEdges=[], routeEdges=[], actionEdges=[];
  for (const raw of lines) {
    const line = raw.trim();
    const fkM = line.match(/^(\w+)\s+\}o--\|\|\s+(\w+)\s+:\s+"(\w+)"/);
    if (fkM && tables[fkM[1]] && tables[fkM[2]]) { fkEdges.push({from:fkM[1],to:fkM[2],col:fkM[3]}); continue; }
    const qM = line.match(/^(\w+)\s+\}.*?\|\|\s+(\w+)\s+:\s+"queries"/);
    if (qM && tables[qM[2]]) {
      const lo = qM[1].toLowerCase();
      const isAction = lo.includes('action') || lo.endsWith('ts') || lo.startsWith('get') || lo.startsWith('upsert') || lo.startsWith('create') || lo.startsWith('delete') || lo.startsWith('update') || lo.startsWith('server');
      const arr = isAction ? actionEdges : routeEdges;
      if (!arr.some(e=>e.from===qM[1]&&e.to===qM[2])) arr.push({from:qM[1],to:qM[2]});
    }
  }
  return {tables, fkEdges, routeEdges, actionEdges};
}

function buildDbGraph(data, showFk, showRoutes, showActions) {
  const {tables, fkEdges, routeEdges, actionEdges} = data;
  const domainGroups = {};
  for (const name of Object.keys(tables)) {
    const d = getDomain(name); if (!domainGroups[d]) domainGroups[d]=[];
    domainGroups[d].push(name);
  }
  const lines = [FLOW_INIT, 'graph LR'];
  lines.push('  classDef tbl fill:#0c1a30,stroke:#334155,color:#7dd3fc,rx:4');
  lines.push('  classDef route fill:#0a180a,stroke:#166534,color:#4ade80,rx:3');
  lines.push('  classDef action fill:#1a0e00,stroke:#92400e,color:#fbbf24,rx:3');

  let dgIdx = 0;
  for (const [domain, names] of Object.entries(domainGroups)) {
    const id = 'DG'+dgIdx++;
    lines.push('  subgraph '+id+'["'+domain+'"]');
    for (const n of names) lines.push('    '+n+'["'+n+'"]:::tbl');
    lines.push('  end');
  }

  // source nodes
  const srcs = new Set();
  if (showRoutes) for (const e of routeEdges) srcs.add(e.from+'|route');
  if (showActions) for (const e of actionEdges) srcs.add(e.from+'|action');
  for (const s of srcs) {
    const [name,kind] = s.split('|');
    const lbl = kind==='route' ? '⬡ '+name : '⚡ '+name;
    lines.push('  '+name+'["'+lbl+'"]:::'+kind);
  }

  // Collect edges in order for linkStyle
  const edgeColors = [];
  if (showFk) for (const e of fkEdges) {
    lines.push('  '+e.from+' -->|"'+e.col+'"| '+e.to); edgeColors.push('#38bdf8');
  }
  if (showRoutes) for (const e of routeEdges) {
    lines.push('  '+e.from+' --> '+e.to); edgeColors.push('#4ade80');
  }
  if (showActions) for (const e of actionEdges) {
    lines.push('  '+e.from+' --> '+e.to); edgeColors.push('#f59e0b');
  }
  edgeColors.forEach((c,i) => lines.push('  linkStyle '+i+' stroke:'+c+',stroke-width:2px'));

  if (!edgeColors.length && Object.keys(tables).length===0) lines.push('  empty["(데이터 없음)"]');
  return lines.join('\n');
}

async function renderDbView(view) {
  const inner = document.getElementById('i-d');
  inner.innerHTML = '<div class="loading-msg">렌더링 중...</div>';
  try {
    if (!dbGraphs) {
      const data = parseDbData(DIAGRAMS.d);
      dbGraphs = {
        fk:      buildDbGraph(data,true, false,false),
        routes:  buildDbGraph(data,false,true, false),
        actions: buildDbGraph(data,false,false,true),
        all:     buildDbGraph(data,true, true, true),
        _data: data
      };
    }
    const diag = dbGraphs[view] || dbGraphs.fk;
    const id = 'dbsvg_'+view+'_'+Date.now();
    const {svg} = await mermaid.render(id, diag);
    inner.innerHTML = svg;
    const svgEl = inner.querySelector('svg');
    if (svgEl) {
      const vb = svgEl.viewBox.baseVal;
      if (vb && vb.width > 0) { svgEl.setAttribute('width',vb.width); svgEl.setAttribute('height',vb.height); }
      svgEl.style.maxWidth = 'none';
    }
    fitToView('d');
  } catch(e) {
    inner.innerHTML = '<pre style="color:#fb923c;padding:20px;font-size:11px">'+e.message+'</pre>';
  }
}

function setDbView(view) {
  dbCurrentView = view;
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.toggle('active', b.dataset.v===view));
  ST.d = {s:1,x:0,y:0};
  renderDbView(view);
}

function fitToView(t) {
  const wrap = document.getElementById('w-'+t);
  const inner = document.getElementById('i-'+t);
  const svg = inner.querySelector('svg');
  if (!svg) return;
  const wW = wrap.clientWidth, wH = wrap.clientHeight;
  let sW = parseFloat(svg.getAttribute('width')) || svg.clientWidth || 800;
  let sH = parseFloat(svg.getAttribute('height')) || svg.clientHeight || 600;
  if (sW < 10) sW = 800; if (sH < 10) sH = 600;
  const s = Math.min(wW*0.88/sW, wH*0.88/sH, 1.0);
  ST[t] = {s, x:0, y:0};
  applyTransform(t);
}

function applyTransform(t) {
  const {s,x,y} = ST[t];
  document.getElementById('i-'+t).style.transform =
    'translate(calc(-50% + '+x+'px), calc(-50% + '+y+'px)) scale('+s+')';
}

function zm(t, f) { ST[t].s = Math.max(0.1, Math.min(ST[t].s*f, 5)); applyTransform(t); }
function rz(t) { fitToView(t); }

document.addEventListener('mousedown', e => {
  const wrap = e.target.closest('.canvas-wrap');
  if (!wrap) return;
  const t = wrap.id.slice(2);
  drag.t=t; drag.sx=e.clientX; drag.sy=e.clientY; drag.ox=ST[t].x; drag.oy=ST[t].y;
  wrap.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!drag.t) return;
  ST[drag.t].x = drag.ox+(e.clientX-drag.sx);
  ST[drag.t].y = drag.oy+(e.clientY-drag.sy);
  applyTransform(drag.t);
});
document.addEventListener('mouseup', () => {
  if (drag.t) document.getElementById('w-'+drag.t)?.classList.remove('dragging');
  drag.t=null;
});
document.querySelectorAll('.canvas-wrap').forEach(w => {
  w.addEventListener('wheel', e => {
    e.preventDefault();
    zm(w.id.slice(2), e.deltaY<0?1.1:0.9);
  }, {passive:false});
});

function buildSidebar(erDiagram) {
  const lines = erDiagram.split('\n');
  // tables: name → { columns:[{type,name,pk,fk}], fkOut:[{col,toTable}], usedBy:[{name,kind}] }
  const tables = {};
  const proxies = new Set();
  let current = null;

  // 1. Parse entity blocks
  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('%%') || line === 'erDiagram') continue;
    const em = line.match(/^(\w+)\s*\{/);
    if (em) { current = em[1]; if (!tables[current]) tables[current] = {columns:[],fkOut:[],usedBy:[]}; continue; }
    if (line === '}') { current = null; continue; }
    if (current) {
      const cm = line.match(/^(\S+)\s+(\S+)(\s+PK)?(\s+FK)?/);
      if (cm) tables[current].columns.push({type:cm[1], name:cm[2], pk:!!cm[3], fk:!!cm[4]});
    }
  }

  // 2. Remove proxy entities (string name only)
  for (const [k, v] of Object.entries(tables)) {
    if (v.columns.length === 1 && v.columns[0].type === 'string' && v.columns[0].name === 'name') {
      proxies.add(k); delete tables[k];
    }
  }

  // 3. Parse relationships
  for (const raw of lines) {
    const line = raw.trim();
    // FK between tables: A }o--|| B : "col"
    const fkM = line.match(/^(\w+)\s+\}o--\|\|\s+(\w+)\s+:\s+"(\w+)"/);
    if (fkM) { if (tables[fkM[1]]) tables[fkM[1]].fkOut.push({col:fkM[3], toTable:fkM[2]}); continue; }
    // Queries: src }|--|| tbl : "queries"
    const qM = line.match(/^(\w+)\s+\}.*?\|\|\s+(\w+)\s+:\s+"queries"/);
    if (qM) {
      const [,src,tbl] = qM;
      if (!tables[tbl]) continue;
      if (tables[tbl].usedBy.some(u => u.name === src)) continue;
      const lo = src.toLowerCase();
      const kind = lo.includes('action') || lo.endsWith('ts') ? 'action'
                 : (proxies.has(src) || lo.startsWith('about') || lo.startsWith('blog') || lo.startsWith('contact') || lo.startsWith('admin') || lo.startsWith('api') || lo.startsWith('login') || lo.startsWith('project') || lo.startsWith('get') || lo.includes('page')) ? 'route'
                 : 'comp';
      tables[tbl].usedBy.push({name:src, kind});
    }
  }

  // 4. Render
  const container = document.getElementById('sidebar-tables');
  const names = Object.keys(tables);
  if (!names.length) { container.innerHTML = '<div style="color:var(--text-muted);font-size:11px;padding:8px">테이블 없음</div>'; return; }

  container.innerHTML = names.map(name => {
    const t = tables[name];
    const cols = t.columns.map(c => {
      const b = c.pk ? '<span class="col-pk">PK</span>' : c.fk ? '<span class="col-fk">FK</span>' : '<span></span>';
      return '<div class="col-row"><span class="col-name">'+c.name+'</span>'+b+'<span class="col-type">'+c.type+'</span></div>';
    }).join('');
    const fkHtml = t.fkOut.length
      ? '<div class="table-refs" style="background:rgba(245,158,11,.04);border-top:1px solid var(--border-sub)"><div class="refs-label" style="color:#b45309">FK</div>'+
        t.fkOut.map(f=>'<div class="ref-row"><span class="ref-action" style="font-size:9px">'+f.col+'</span><span class="fk-arrow"> → </span><span class="ref-route" style="font-size:9px">'+f.toTable+'</span></div>').join('')+'</div>' : '';
    const usedHtml = t.usedBy.length
      ? '<div class="table-refs"><div class="refs-label">Used by</div>'+
        t.usedBy.map(u => {
          const cls = u.kind==='route' ? 'ref-route' : u.kind==='action' ? 'ref-action' : 'ref-comp';
          const pre = u.kind==='route' ? '⬡ ' : u.kind==='action' ? '⚡ ' : '';
          return '<div class="ref-row"><span class="'+cls+'">'+pre+u.name+'</span></div>';
        }).join('')+'</div>' : '';
    return '<div class="table-card"><div class="table-head"><span class="table-head-icon">◈</span>'+name+'</div>'+cols+fkHtml+usedHtml+'</div>';
  }).join('');
}

renderTab('r');
</script>
